<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Symptom Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🩺 AI Medical Symptom Checker</h1>

    <form action="/predict" method="POST">

        <label>Fever</label>
        <select name="fever">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Cough</label>
        <select name="cough">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Headache</label>
        <select name="headache">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Fatigue</label>
        <select name="fatigue">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Sore Throat</label>
        <select name="sore_throat">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Body Pain</label>
        <select name="body_pain">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <button type="submit">Predict Disease</button>

    </form>

    {% if prediction %}
    <div class="result">
        <h2>Predicted Disease:</h2>
        <p>{{ prediction }}</p>

        <h3>Recommendation:</h3>
        <p>{{ recommendation }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
